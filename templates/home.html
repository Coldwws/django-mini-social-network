{% extends "base.html" %}

{% block content %}

<h1>Mini Social Network</h1>
    
<a href="{% url 'feed' %}">Лента постов</a>
{% if user.is_authenticated %}
    <p>Добро пожаловать, {{ user.username }}!</p>
    <a href="{% url 'profile' user.username %}">Мой профиль</a>
{% else %}
    <p>Добро пожаловать на сайт!</p>
{% endif %}

{% endblock %}
